version: '3.9'

services:
  # ─── PostgreSQL Database ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: slooze-db
    environment:
      POSTGRES_USER: slooze
      POSTGRES_PASSWORD: slooze_secret
      POSTGRES_DB: slooze_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slooze -d slooze_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - slooze-network

  # ─── Redis Cache ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: slooze-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - slooze-network

  # ─── Backend API ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: slooze-backend
    environment:
      DATABASE_URL: postgresql://slooze:slooze_secret@postgres:5432/slooze_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-super-secret-jwt-key-change-in-production}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:8080"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - slooze-network
    restart: unless-stopped

  # ─── Frontend App ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: slooze-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - slooze-network
    restart: unless-stopped

  # ─── Nginx Reverse Proxy ───────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: slooze-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - slooze-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  slooze-network:
    driver: bridge
